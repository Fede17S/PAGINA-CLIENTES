<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DistriMar - Pedidos Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --blue: #0056b3; --green: #25d366; --bg: #f4f7f6; --text: #333; --red: #dc3545; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .login-box, .catalog-box { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; display: block; text-align: center; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); }
        
        /* Estilos de la tarjeta de producto */
        .prod-card { display: flex; flex-direction: column; padding: 15px 10px; border-bottom: 1px solid #eee; gap: 10px; }
        .prod-main { display: flex; align-items: center; gap: 10px; }
        .prod-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .prod-info { flex: 1; }
        
        /* Controles de cantidad en catálogo */
        .prod-action-row { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; background: #f9f9f9; padding: 8px; border-radius: 8px; }
        .qty-selector { display: flex; align-items: center; gap: 15px; background: white; border: 1px solid #ddd; border-radius: 6px; padding: 2px 10px; }
        .qty-selector button { background: none; border: none; font-size: 20px; font-weight: bold; color: var(--blue); cursor: pointer; padding: 0 5px; }
        .qty-selector span { font-weight: bold; min-width: 20px; text-align: center; }

        .cart-float { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: bold; cursor: pointer; z-index: 1000; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 500px; max-height: 85vh; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-body { overflow-y: auto; flex: 1; padding: 10px 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

    <div id="login-section" class="login-box">
        <h2 style="text-align:center">DISTRIMAR</h2>
        <input type="text" id="user-id" placeholder="ID de Cliente">
        <input type="password" id="user-pass" placeholder="Contraseña (Tu ID)">
        <button class="btn btn-blue" id="btn-login" onclick="login()">INGRESAR</button>
    </div>

    <div id="catalog-section" class="catalog-box hidden">
        <h3 id="welcome-msg">Hola!</h3>
        <input type="text" id="search" placeholder="🔍 Buscar productos..." oninput="renderCatalog()">
        <div id="product-list"></div>
    </div>

    <div id="cart-btn" class="cart-float hidden" onclick="openCart()">
        🛒 Pedido (<span id="cart-count">0</span>) - $<span id="cart-total-float">0</span>
    </div>

    <div id="cart-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Resumen del Pedido</h3>
                <button onclick="closeCart()" style="background:none; border:none; font-size:20px; cursor:pointer;">❌</button>
            </div>
            <div id="cart-items" class="modal-body"></div>
            <div class="modal-footer" style="border-top:1px solid #eee; padding-top:10px;">
                <h3 style="margin:0 0 10px 0; text-align:right;">Total: $<span id="cart-total-modal">0.00</span></h3>
                <button class="btn btn-green" onclick="checkout()">✅ ENVIAR PEDIDO</button>
            </div>
        </div>
    </div>

    <script>
        let dbStock = [], dbCli = [], currentUser = null;
        let cart = []; 

        const URL_STK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQGGGUL7sB1gqhvZLKJtqtYgIZbyfbK9EmUKPnPpwFNX-uEYrRN2VWGgpOF3WDxheXKvkIr0VW8oVF/pub?output=csv";
        const URL_CLI = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWgQatDMyC-hkTph-idGBLXnjBBymRd26tz-kCY-hJaRZGzFtObAh5C0mCO25yzXZjubZ-xt3oq6s/pub?output=csv";

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            const sep = lines[0].includes(';') ? ';' : ',';
            return lines.slice(1).map(line => {
                const values = [];
                let current = '', inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === sep && !inQuotes) { values.push(current.trim()); current = ''; }
                    else current += char;
                }
                values.push(current.trim());
                return values.map(v => v.replace(/"/g, ''));
            });
        }

        async function login() {
            const idInput = document.getElementById('user-id').value.trim();
            const passInput = document.getElementById('user-pass').value.trim();
            if(!idInput) return alert("Ingresa tu ID");

            try {
                const [resS, resC] = await Promise.all([
                    fetch(URL_STK + '&cache=' + Date.now()),
                    fetch(URL_CLI + '&cache=' + Date.now())
                ]);
                const txtS = await resS.text();
                const txtC = await resC.text();
                const rawCli = parseCSV(txtC);
                dbCli = rawCli.map(r => ({ id: r[0], nom: r[1], lista: r[2] || "Clientes" }));
                currentUser = dbCli.find(c => c.id === idInput);

                if (currentUser && idInput === passInput) {
                    const rawStk = parseCSV(txtS);
                    dbStock = rawStk.map(r => {
                        let precio = currentUser.lista.toLowerCase().includes("patagonia") ? r[3] : r[2];
                        let pLimpio = precio.replace('$','').replace('.','').replace(',','.');
                        let img = r[4] && r[4].trim() !== "" ? r[4] : "https://via.placeholder.com/70x70.png?text=Sin+Foto";
                        return { id: r[0], n: r[1], p: parseFloat(pLimpio) || 0, img: img };
                    });
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('catalog-section').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = `Hola, ${currentUser.nom}`;
                    renderCatalog();
                } else {
                    alert("ID o Contraseña incorrectos.");
                }
            } catch (e) { alert("Error de conexión."); }
        }

        function renderCatalog() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            
            const filtered = dbStock.filter(p => p.n.toLowerCase().includes(query) || p.id.toLowerCase().includes(query));
            
            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = "prod-card";
                div.innerHTML = `
                    <div class="prod-main">
                        <img src="${p.img}" class="prod-img" onerror="this.src='https://via.placeholder.com/70x70.png?text=Sin+Foto'">
                        <div class="prod-info">
                            <small>#${p.id}</small><br>
                            <b>${p.n}</b><br>
                            <span style="color:var(--blue); font-weight:bold">$${p.p.toLocaleString('es-AR')}</span>
                        </div>
                    </div>
                    <div class="prod-action-row">
                        <div class="qty-selector">
                            <button onclick="changeInCatalog('${p.id}', -1)">-</button>
                            <span id="qty-${p.id}">1</span>
                            <button onclick="changeInCatalog('${p.id}', 1)">+</button>
                        </div>
                        <button class="btn btn-blue" style="width:auto; margin:0; padding:8px 15px;" onclick="addFromCatalog('${p.id}')">🛒 AGREGAR</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // Maneja el contador visual en el catálogo
        function changeInCatalog(id, delta) {
            const el = document.getElementById(`qty-${id}`);
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1;
            el.innerText = val;
        }

        // Agrega la cantidad seleccionada al carrito
        function addFromCatalog(id) {
            const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
            const p = dbStock.find(x => x.id === id);
            
            let item = cart.find(i => i.producto.id === id);
            if (item) {
                item.cantidad += qty;
            } else {
                cart.push({ producto: p, cantidad: qty });
            }
            
            // Resetear el contador del catálogo a 1 después de agregar
            document.getElementById(`qty-${id}`).innerText = 1;
            
            actualizarBotonFlotante();
            alert(`Agregado: ${qty} x ${p.n}`);
        }

        function actualizarBotonFlotante() {
            const btn = document.getElementById('cart-btn');
            let totalUnidades = cart.reduce((s, i) => s + i.cantidad, 0);
            let totalPlata = cart.reduce((s, i) => s + (i.producto.p * i.cantidad), 0);
            
            if (totalUnidades > 0) {
                btn.classList.remove('hidden');
                document.getElementById('cart-count').innerText = totalUnidades;
                document.getElementById('cart-total-float').innerText = totalPlata.toLocaleString('es-AR');
            } else {
                btn.classList.add('hidden');
            }
        }

        function openCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = "";
            let total = 0;

            cart.forEach(item => {
                let sub = item.producto.p * item.cantidad;
                total += sub;
                const div = document.createElement('div');
                div.className = "cart-item";
                div.innerHTML = `
                    <div style="flex:1"><b>${item.producto.n}</b><br><small>${item.cantidad} x $${item.producto.p}</small></div>
                    <div style="font-weight:bold">$${sub.toLocaleString('es-AR')}</div>
                    <button onclick="removeItem('${item.producto.id}')" style="margin-left:10px; border:none; background:none; color:red;">🗑️</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('cart-total-modal').innerText = total.toLocaleString('es-AR');
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function removeItem(id) {
            cart = cart.filter(i => i.producto.id !== id);
            actualizarBotonFlotante();
            if (cart.length > 0) openCart(); else closeCart();
        }

        function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); }

        async function checkout() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const total = cart.reduce((s, i) => s + (i.producto.p * i.cantidad), 0);
            
            doc.text("DISTRIMAR - PEDIDO", 105, 20, {align:'center'});
            doc.text(`Cliente: ${currentUser.nom}`, 14, 30);
            
            doc.autoTable({
                startY: 40,
                head: [['Cant', 'Producto', 'Subtotal']],
                body: cart.map(i => [i.cantidad, i.producto.n, `$${(i.producto.p * i.cantidad).toFixed(2)}`]),
                foot: [['', 'TOTAL', `$${total.toFixed(2)}`]]
            });

            const blob = doc.output('blob');
            const file = new File([blob], `Pedido_${currentUser.nom}.pdf`, { type: 'application/pdf' });

            if (navigator.share) {
                await navigator.share({ files: [file], text: `Pedido de ${currentUser.nom}` });
            } else {
                doc.save(`Pedido_${currentUser.nom}.pdf`);
            }
            cart = [];
            actualizarBotonFlotante();
            closeCart();
        }
    </script>
</body>
</html>
