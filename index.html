<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DistriMar - Pedidos Online Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            /* Nueva paleta: Azul Profundo a Naranja Vibrante */
            --grad-start: #1e3a8a; /* Azul */
            --grad-end: #f97316;   /* Naranja */
            --bg-soft: #f8fafc;
            --text-main: #1e293b;
            --text-second: #64748b;
            --white: #ffffff;
            --border-light: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
            /* Degradado de fondo aplicado a todo el sitio */
            background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- INPUTS Y BOTONES MINIMALISTAS --- */
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--bg-soft);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--grad-end);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            color: var(--white);
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-blue { background-color: var(--grad-start); }
        .btn-green { background-color: #10b981; }

        .hidden { display: none !important; }

        /* --- PANTALLA DE LOGUEO --- */
        .login-box {
            max-width: 380px;
            margin: 15vh auto;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-box h2 {
            color: var(--grad-start);
            margin: 0 0 5px 0;
            font-size: 32px;
            letter-spacing: -1px;
        }

        .login-box p {
            color: var(--text-second);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* --- PANEL DE LA TIENDA --- */
        #catalog-section {
            background-color: var(--bg-soft);
            min-height: 100vh;
        }

        .header-store {
            background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
            color: white;
        }

        #welcome-msg {
            margin: 0 0 15px 0;
            font-weight: 300;
            font-size: 18px;
        }

        input#search {
            margin: 0;
            border: none;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        input#search::placeholder { color: rgba(255, 255, 255, 0.8); }

        .catalog-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 15px 100px 15px;
        }

        /* --- TARJETAS DE PRODUCTO --- */
        #product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .prod-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .prod-card:hover {
            transform: translateY(-5px);
            border-color: var(--grad-end);
        }

        .prod-img-container {
            height: 180px;
            padding: 15px;
            background: #fdfdfd;
        }

        .prod-img { width: 100%; height: 100%; object-fit: contain; }

        .prod-info { padding: 15px; flex: 1; }

        .prod-name {
            font-size: 15px;
            font-weight: 600;
            margin: 5px 0;
            color: var(--text-main);
            height: 40px;
            overflow: hidden;
        }

        .prod-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--grad-start);
        }

        .prod-action-row {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--bg-soft);
        }

        /* --- CARRITO FLOTANTE --- */
        .cart-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--grad-start);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            z-index: 1000;
        }

        /* --- MODAL --- */
        .modal-content {
            border-radius: 24px !important;
            padding: 30px !important;
        }

        #toast {
            background-color: var(--text-main);
            border-radius: 12px;
            padding: 15px 30px;
        }
    </style>
</head>
<body>

    <div id="toast">Producto agregado</div>

    <!-- PANTALLA DE LOGUEO -->
    <div id="login-section" class="login-box">
        <h2>DISTRIMAR</h2>
        <p>Premium Distribution Service</p>
        <div id="status-msg" class="hidden" style="color: var(--grad-start); margin-bottom: 10px;">Validando credenciales...</div>
        <input type="text" id="user-id" placeholder="ID de Cliente">
        <input type="password" id="user-pass" placeholder="Contraseña">
        <button class="btn btn-blue" id="btn-login" onclick="login()" style="background: linear-gradient(to right, var(--grad-start), #3b82f6); margin-top: 10px;">
            ENTRAR AL CATÁLOGO
        </button>
    </div>

    <!-- SECCIÓN CATÁLOGO -->
    <div id="catalog-section" class="hidden">
        <div class="header-store">
            <h3 id="welcome-msg">Bienvenido</h3>
            <input type="text" id="search" placeholder="Buscar productos por nombre o código..." oninput="renderCatalog()">
        </div>
        
        <div class="catalog-container">
            <div id="product-list"></div>
        </div>
    </div>

    <!-- BOTÓN CARRITO -->
    <div id="cart-btn" class="cart-float hidden" onclick="openCart()">
        <span>🛒</span>
        <span id="cart-count" style="background: var(--grad-end); padding: 2px 8px; border-radius: 8px; font-size: 12px;">0</span>
        <span style="font-weight: bold;">$<span id="cart-total-float">0</span></span>
    </div>

    <!-- MODAL CARRITO -->
    <div id="cart-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tu Pedido</h3>
                <button onclick="closeCart()" style="background:none; border:none; font-size:24px; cursor:pointer;">×</button>
            </div>
            <div id="cart-items" class="modal-body"></div>
            <div class="modal-footer">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="color: var(--text-second);">Total Estimado:</span>
                    <span style="font-size: 24px; font-weight: 700; color: var(--grad-start);">$<span id="cart-total-modal">0</span></span>
                </div>
                <button class="btn btn-green" onclick="checkout()">CONFIRMAR PEDIDO</button>
            </div>
        </div>
    </div>

    <script>
        // --- LA LÓGICA JS SE MANTIENE IGUAL A TU ORIGINAL ---
        let dbStock = [], dbCli = [], currentUser = null, cart = [];
        const URL_STK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQGGGUL7sB1gqhvZLKJtqtYgIZbyfbK9EmUKPnPpwFNX-uEYrRN2VWGgpOF3WDxheXKvkIr0VW8oVF/pub?output=csv";
        const URL_CLI = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWgQatDMyC-hkTph-idGBLXnjBBymRd26tz-kCY-hJaRZGzFtObAh5C0mCO25yzXZjubZ-xt3oq6s/pub?output=csv";

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            const sep = lines[0].includes(';') ? ';' : ',';
            return lines.slice(1).map(line => {
                const values = [];
                let current = '', inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === sep && !inQuotes) { values.push(current.trim()); current = ''; }
                    else current += char;
                }
                values.push(current.trim());
                return values.map(v => v.replace(/"/g, ''));
            });
        }

        async function login() {
            const idInput = document.getElementById('user-id').value.trim();
            const passInput = document.getElementById('user-pass').value.trim();
            if(!idInput) return alert("Ingresa tu ID");
            document.getElementById('status-msg').classList.remove('hidden');
            try {
                const [resS, resC] = await Promise.all([fetch(URL_STK), fetch(URL_CLI)]);
                const rawCli = parseCSV(await resC.text());
                dbCli = rawCli.map(r => ({ id: r[0], nom: r[1], lista: r[2] || "Clientes" }));
                currentUser = dbCli.find(c => c.id === idInput);

                if (currentUser && idInput === passInput) {
                    const rawStk = parseCSV(await resS.text());
                    dbStock = rawStk.map((r, index) => {
                        let precio = currentUser.lista.toLowerCase().includes("patagonia") ? r[3] : r[2];
                        let pLimpio = precio.replace('$','').replace('.','').replace(',','.');
                        return { 
                            internalId: index, id: r[0], n: r[1], 
                            p: parseFloat(pLimpio) || 0, 
                            img: r[4] || "https://via.placeholder.com/200x200.png?text=DistriMar"
                        };
                    });
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('catalog-section').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = `Bienvenido, ${currentUser.nom}`;
                    renderCatalog();
                } else { alert("Datos incorrectos"); }
            } catch (e) { alert("Error de red"); }
            finally { document.getElementById('status-msg').classList.add('hidden'); }
        }

        function renderCatalog() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            const filtered = dbStock.filter(p => p.n.toLowerCase().includes(query) || p.id.toLowerCase().includes(query));
            filtered.forEach(p => {
                const spanId = `qty-val-${p.internalId}`;
                const div = document.createElement('div');
                div.className = "prod-card";
                div.innerHTML = `
                    <div class="prod-img-container"><img src="${p.img}" class="prod-img"></div>
                    <div class="prod-info">
                        <small style="color:var(--text-second)">#${p.id}</small>
                        <div class="prod-name">${p.n}</div>
                        <div class="prod-price">$${p.p.toLocaleString('es-AR')}</div>
                    </div>
                    <div class="prod-action-row">
                        <div class="qty-selector">
                            <button onclick="changeQty('${spanId}', -1)" style="color:var(--grad-end)">-</button>
                            <span id="${spanId}">1</span>
                            <button onclick="changeQty('${spanId}', 1)" style="color:var(--grad-end)">+</button>
                        </div>
                        <button class="btn btn-blue" style="width:auto; padding:8px 15px; font-size:12px;" onclick="addToCart(${p.internalId})">AÑADIR</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function changeQty(spanId, delta) {
            const el = document.getElementById(spanId);
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1;
            el.innerText = val;
        }

        function addToCart(internalId) {
            const product = dbStock.find(p => p.internalId === internalId);
            const qty = parseInt(document.getElementById(`qty-val-${internalId}`).innerText);
            let existing = cart.find(i => i.producto.internalId === internalId);
            if (existing) existing.cantidad += qty;
            else cart.push({ producto: product, cantidad: qty });
            showToast(`Sumado: ${product.n}`);
            actualizarBotonFlotante();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = "1";
            setTimeout(() => { t.style.opacity = "0"; }, 2000);
        }

        function actualizarBotonFlotante() {
            const btn = document.getElementById('cart-btn');
            let totalUnidades = cart.reduce((s, i) => s + i.cantidad, 0);
            let totalPlata = cart.reduce((s, i) => s + (i.producto.p * i.cantidad), 0);
            if (totalUnidades > 0) {
                btn.classList.remove('hidden');
                document.getElementById('cart-count').innerText = totalUnidades;
                document.getElementById('cart-total-float').innerText = totalPlata.toLocaleString('es-AR');
            } else { btn.classList.add('hidden'); }
        }

        function openCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = "";
            let total = 0;
            cart.forEach(item => {
                let sub = item.producto.p * item.cantidad;
                total += sub;
                const div = document.createElement('div');
                div.className = "cart-item";
                div.innerHTML = `
                    <div style="flex:1"><b>${item.producto.n}</b><br><small>${item.cantidad} x $${item.producto.p}</small></div>
                    <div style="font-weight:bold">$${sub.toLocaleString('es-AR')}</div>
                    <button onclick="removeItem(${item.producto.internalId})" style="border:none; background:none; cursor:pointer; margin-left:10px;">🗑️</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('cart-total-modal').innerText = total.toLocaleString('es-AR');
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function removeItem(id) {
            cart = cart.filter(i => i.producto.internalId !== id);
            actualizarBotonFlotante();
            if (cart.length > 0) openCart(); else closeCart();
        }

        function closeCart() { document.getElementById('cart-modal').classList.add('hidden'); }

        async function checkout() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const total = cart.reduce((s, i) => s + (i.producto.p * i.cantidad), 0);
            doc.text("Pedido DistriMar", 20, 20);
            doc.autoTable({
                startY: 30,
                head: [['Cant', 'Producto', 'Subtotal']],
                body: cart.map(i => [i.cantidad, i.producto.n, `$${(i.producto.p * i.cantidad).toFixed(2)}`]),
            });
            doc.save("pedido.pdf");
            alert("Pedido descargado satisfactoriamente.");
            cart = []; actualizarBotonFlotante(); closeCart();
        }
    </script>
</body>
</html>
