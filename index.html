<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DistriMar - Pedidos Online Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --grad-start: #1e3a8a;
            --grad-end: #f97316;
            --bg-soft: #f8fafc;
            --text-main: #1e293b;
            --text-second: #64748b;
            --white: #ffffff;
            --border-light: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--bg-soft);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--grad-end);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(249,115,22,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            color: var(--white);
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-blue { background-color: var(--grad-start); }
        .btn-green { background-color: #10b981; }
        .btn-orange { background-color: var(--grad-end); }

        .hidden { display: none !important; }

        /* --- LOGIN --- */
        .login-box {
            max-width: 380px;
            margin: 15vh auto;
            background-color: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            color: var(--grad-start);
            margin: 0 0 5px 0;
            font-size: 32px;
            letter-spacing: -1px;
        }

        .login-box p {
            color: var(--text-second);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* --- CATÁLOGO --- */
        #catalog-section {
            background-color: var(--bg-soft);
            min-height: 100vh;
        }

        .header-store {
            background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
            color: white;
        }

        #welcome-msg {
            margin: 0 0 15px 0;
            font-weight: 300;
            font-size: 18px;
        }

        input#search {
            margin: 0;
            border: none;
            background-color: rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        input#search::placeholder { color: rgba(255,255,255,0.8); }

        .catalog-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 15px 100px 15px;
        }

        /* --- TARJETAS --- */
        #product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .prod-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .prod-card:hover {
            transform: translateY(-5px);
            border-color: var(--grad-end);
        }

        .prod-img-container {
            height: 180px;
            padding: 15px;
            background: #fdfdfd;
        }

        .prod-img { width: 100%; height: 100%; object-fit: contain; }
        .prod-info { padding: 15px; flex: 1; }

        .prod-name {
            font-size: 15px;
            font-weight: 600;
            margin: 5px 0;
            color: var(--text-main);
            height: 40px;
            overflow: hidden;
        }

        .prod-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--grad-start);
        }

        .prod-action-row {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--bg-soft);
        }

        /* --- SELECTOR DE CANTIDAD --- */
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-soft);
            border-radius: 10px;
            padding: 4px 10px;
        }

        .qty-selector button {
            background: none;
            border: none;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
            color: var(--grad-end);
        }

        .qty-selector span {
            min-width: 20px;
            text-align: center;
            font-weight: 600;
        }

        /* --- CARRITO FLOTANTE --- */
        .cart-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--grad-start);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.2s;
        }

        .cart-float:active { transform: scale(0.96); }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
        }

        @media (min-width: 600px) {
            .modal-overlay {
                align-items: center;
                padding: 20px;
            }
        }

        .modal-content {
            background: var(--white);
            border-radius: 24px 24px 0 0;
            padding: 30px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
            box-sizing: border-box;
        }

        @media (min-width: 600px) {
            .modal-content {
                border-radius: 24px;
                animation: fadeIn 0.2s ease;
            }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 22px;
            color: var(--text-main);
        }

        .modal-header button {
            background: var(--bg-soft);
            border: none;
            font-size: 22px;
            cursor: pointer;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-second);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            padding-right: 4px;
        }

        .modal-footer {
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }

        /* --- ITEMS DEL CARRITO --- */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--bg-soft);
            border-radius: 14px;
        }

        .cart-item b { font-size: 14px; color: var(--text-main); }
        .cart-item small { color: var(--text-second); font-size: 12px; }

        /* --- TOAST --- */
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--text-main);
            color: white;
            border-radius: 12px;
            padding: 12px 28px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* --- BOTONES DE ACCIÓN POST-PEDIDO --- */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="toast">Producto agregado</div>

    <!-- LOGIN -->
    <div id="login-section" class="login-box">
        <h2>DISTRIMAR</h2>
        <p>Premium Distribution Service</p>
        <div id="status-msg" class="hidden" style="color: var(--grad-start); margin-bottom: 10px;">Validando credenciales...</div>
        <input type="text" id="user-id" placeholder="ID de Cliente">
        <input type="password" id="user-pass" placeholder="Contraseña">
        <button class="btn btn-blue" onclick="login()" style="background: linear-gradient(to right, var(--grad-start), #3b82f6); margin-top: 10px;">
            ENTRAR AL CATÁLOGO
        </button>
    </div>

    <!-- CATÁLOGO -->
    <div id="catalog-section" class="hidden">
        <div class="header-store">
            <h3 id="welcome-msg">Bienvenido</h3>
            <input type="text" id="search" placeholder="Buscar productos por nombre o código..." oninput="renderCatalog()">
        </div>
        <div class="catalog-container">
            <div id="product-list"></div>
        </div>
    </div>

    <!-- BOTÓN CARRITO FLOTANTE -->
    <div id="cart-btn" class="cart-float hidden" onclick="openCart()">
        <span>🛒</span>
        <span id="cart-count" style="background: var(--grad-end); padding: 2px 8px; border-radius: 8px; font-size: 12px;">0</span>
        <span style="font-weight: bold;">$<span id="cart-total-float">0</span></span>
    </div>

    <!-- MODAL CARRITO -->
    <div id="cart-modal" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🛒 Tu Pedido</h3>
                <button onclick="closeCart()">×</button>
            </div>
            <div id="cart-items" class="modal-body"></div>
            <div class="modal-footer">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <span style="color:var(--text-second); font-size:16px;">Total Estimado:</span>
                    <span style="font-size:24px; font-weight:700; color:var(--grad-start);">$<span id="cart-total-modal">0</span></span>
                </div>
                <button class="btn btn-green" onclick="checkout()">CONFIRMAR PEDIDO 📄</button>
            </div>
        </div>
    </div>

    <!-- MODAL POST-PEDIDO (compartir / descargar) -->
    <div id="share-modal" class="modal-overlay hidden" onclick="handleShareOverlayClick(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✅ Pedido Generado</h3>
                <button onclick="closeShareModal()">×</button>
            </div>
            <div class="modal-body" style="flex:unset; overflow:unset;">
                <p style="color:var(--text-second); margin:0 0 20px 0; font-size:15px;">
                    Tu pedido fue generado correctamente. ¿Qué querés hacer con el PDF?
                </p>
                <div class="action-buttons">
                    <button class="btn btn-green" onclick="sharePDF()">📤 Compartir PDF</button>
                    <button class="btn btn-blue" onclick="downloadPDF()">⬇️ Descargar PDF</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeShareModal()" style="background:var(--bg-soft); color:var(--text-second);">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let dbStock = [], dbCli = [], currentUser = null, cart = [];
        let lastPdfBlob = null, lastPdfFilename = '';

        const URL_STK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRQGGGUL7sB1gqhvZLKJtqtYgIZbyfbK9EmUKPnPpwFNX-uEYrRN2VWGgpOF3WDxheXKvkIr0VW8oVF/pub?output=csv";
        const URL_CLI = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWgQatDMyC-hkTph-idGBLXnjBBymRd26tz-kCY-hJaRZGzFtObAh5C0mCO25yzXZjubZ-xt3oq6s/pub?output=csv";

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            const sep = lines[0].includes(';') ? ';' : ',';
            return lines.slice(1).map(line => {
                const values = [];
                let current = '', inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === sep && !inQuotes) { values.push(current.trim()); current = ''; }
                    else current += char;
                }
                values.push(current.trim());
                return values.map(v => v.replace(/"/g, ''));
            });
        }

        async function login() {
            const idInput = document.getElementById('user-id').value.trim();
            const passInput = document.getElementById('user-pass').value.trim();
            if (!idInput) return alert("Ingresa tu ID");
            document.getElementById('status-msg').classList.remove('hidden');
            try {
                const [resS, resC] = await Promise.all([fetch(URL_STK), fetch(URL_CLI)]);
                const rawCli = parseCSV(await resC.text());
                dbCli = rawCli.map(r => ({ id: r[0], nom: r[1], lista: r[2] || "Clientes" }));
                currentUser = dbCli.find(c => c.id === idInput);

                if (currentUser && idInput === passInput) {
                    const rawStk = parseCSV(await resS.text());
                    dbStock = rawStk.map((r, index) => {
                        let precio = currentUser.lista.toLowerCase().includes("patagonia") ? r[3] : r[2];
                        let pLimpio = precio.replace('$','').replace('.','').replace(',','.');
                        return {
                            internalId: index, id: r[0], n: r[1],
                            p: parseFloat(pLimpio) || 0,
                            img: r[4] || "https://via.placeholder.com/200x200.png?text=DistriMar"
                        };
                    });
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('catalog-section').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = `Bienvenido, ${currentUser.nom}`;
                    renderCatalog();
                } else { alert("Datos incorrectos"); }
            } catch (e) { alert("Error de red"); }
            finally { document.getElementById('status-msg').classList.add('hidden'); }
        }

        function renderCatalog() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            const filtered = dbStock.filter(p => p.n.toLowerCase().includes(query) || p.id.toLowerCase().includes(query));
            filtered.forEach(p => {
                const spanId = `qty-val-${p.internalId}`;
                const div = document.createElement('div');
                div.className = "prod-card";
                div.innerHTML = `
                    <div class="prod-img-container"><img src="${p.img}" class="prod-img"></div>
                    <div class="prod-info">
                        <small style="color:var(--text-second)">#${p.id}</small>
                        <div class="prod-name">${p.n}</div>
                        <div class="prod-price">$${p.p.toLocaleString('es-AR')}</div>
                    </div>
                    <div class="prod-action-row">
                        <div class="qty-selector">
                            <button onclick="changeQty('${spanId}', -1)">−</button>
                            <span id="${spanId}">1</span>
                            <button onclick="changeQty('${spanId}', 1)">+</button>
                        </div>
                        <button class="btn btn-blue" style="width:auto; padding:8px 15px; font-size:12px;" onclick="addToCart(${p.internalId})">AÑADIR</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function changeQty(spanId, delta) {
            const el = document.getElementById(spanId);
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1;
            el.innerText = val;
        }

        function addToCart(internalId) {
            const product = dbStock.find(p => p.internalId === internalId);
            const qty = parseInt(document.getElementById(`qty-val-${internalId}`).innerText);
            let existing = cart.find(i => i.producto.internalId === internalId);
            if (existing) existing.cantidad += qty;
            else cart.push({ producto: product, cantidad: qty });
            showToast(`Sumado: ${product.n}`);
            actualizarBotonFlotante();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = "1";
            setTimeout(() => { t.style.opacity = "0"; }, 2000);
        }

        function actualizarBotonFlotante() {
            const btn = document.getElementById('cart-btn');
            let totalUnidades = cart.reduce((s, i) => s + i.cantidad, 0);
            let totalPlata = cart.reduce((s, i) => s + (i.producto.p * i.cantidad), 0);
            if (totalUnidades > 0) {
                btn.classList.remove('hidden');
                document.getElementById('cart-count').innerText = totalUnidades;
                document.getElementById('cart-total-float').innerText = totalPlata.toLocaleString('es-AR');
            } else {
                btn.classList.add('hidden');
            }
        }

        function openCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = "";
            let total = 0;
            cart.forEach(item => {
                let sub = item.producto.p * item.cantidad;
                total += sub;
                const div = document.createElement('div');
                div.className = "cart-item";
                div.innerHTML = `
                    <div style="flex:1">
                        <b>${item.producto.n}</b><br>
                        <small>${item.cantidad} x $${item.producto.p.toLocaleString('es-AR')}</small>
                    </div>
                    <div style="font-weight:bold; white-space:nowrap;">$${sub.toLocaleString('es-AR')}</div>
                    <button onclick="removeItem(${item.producto.internalId})" style="border:none; background:none; cursor:pointer; font-size:18px; margin-left:6px;">🗑️</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('cart-total-modal').innerText = total.toLocaleString('es-AR');
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function handleOverlayClick(event) {
            if (event.target === document.getElementById('cart-modal')) closeCart();
        }

        function handleShareOverlayClick(event) {
            if (event.target === document.getElementById('share-modal')) closeShareModal();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.producto.internalId !== id);
            actualizarBotonFlotante();
            if (cart.length > 0) openCart();
            else closeCart();
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        function closeShareModal() {
            document.getElementById('share-modal').classList.add('hidden');
        }

        function buildPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const total = cart.reduce((s, i) => s + (i.producto.p * i.cantidad), 0);

            // Fecha formateada
            const ahora = new Date();
            const fecha = ahora.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const hora  = ahora.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

            // Encabezado
            doc.setFontSize(20);
            doc.setTextColor(30, 58, 138); // azul
            doc.text("DISTRIMAR", 20, 22);

            doc.setFontSize(10);
            doc.setTextColor(100, 116, 139); // gris
            doc.text("Premium Distribution Service", 20, 29);

            // Línea separadora
            doc.setDrawColor(226, 232, 240);
            doc.line(20, 33, 190, 33);

            // Datos del cliente
            doc.setFontSize(11);
            doc.setTextColor(30, 41, 59);
            doc.text(`Cliente: ${currentUser.nom}`, 20, 42);
            doc.text(`ID: ${currentUser.id}`, 20, 50);
            doc.text(`Fecha: ${fecha}  |  Hora: ${hora}`, 20, 58);

            // Línea separadora
            doc.line(20, 63, 190, 63);

            // Tabla de productos
            doc.autoTable({
                startY: 68,
                head: [['Cant.', 'Código', 'Producto', 'P. Unit.', 'Subtotal']],
                body: cart.map(i => [
                    i.cantidad,
                    i.producto.id,
                    i.producto.n,
                    `$${i.producto.p.toLocaleString('es-AR')}`,
                    `$${(i.producto.p * i.cantidad).toLocaleString('es-AR')}`
                ]),
                headStyles: { fillColor: [30, 58, 138], textColor: 255, fontStyle: 'bold' },
                alternateRowStyles: { fillColor: [248, 250, 252] },
                styles: { fontSize: 10 },
                columnStyles: {
                    0: { halign: 'center', cellWidth: 15 },
                    1: { cellWidth: 25 },
                    3: { halign: 'right', cellWidth: 28 },
                    4: { halign: 'right', cellWidth: 30 }
                }
            });

            // Total final
            const finalY = doc.lastAutoTable.finalY + 8;
            doc.setFontSize(13);
            doc.setTextColor(30, 58, 138);
            doc.setFont(undefined, 'bold');
            doc.text(`TOTAL: $${total.toLocaleString('es-AR')}`, 190, finalY, { align: 'right' });

            // Pie de página
            doc.setFontSize(9);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(150);
            doc.text("DistriMar — Gracias por su pedido", 105, 285, { align: 'center' });

            return doc;
        }

        async function checkout() {
            // Generar PDF y guardarlo en memoria
            const doc = buildPDF();
            const pdfBlob = doc.output('blob');
            lastPdfBlob = pdfBlob;
            lastPdfFilename = `pedido_${currentUser.id}_${new Date().toISOString().slice(0,10)}.pdf`;

            // Limpiar carrito y cerrar modal
            cart = [];
            actualizarBotonFlotante();
            closeCart();

            // Abrir modal de compartir
            document.getElementById('share-modal').classList.remove('hidden');
        }

        async function sharePDF() {
            if (!lastPdfBlob) return;
            const file = new File([lastPdfBlob], lastPdfFilename, { type: 'application/pdf' });

            // Usar Web Share API si está disponible (mobile)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        title: 'Pedido DistriMar',
                        text: `Pedido de ${currentUser.nom} (ID: ${currentUser.id})`,
                        files: [file]
                    });
                } catch (e) {
                    if (e.name !== 'AbortError') downloadPDF(); // fallback si falla
                }
            } else {
                // Fallback para desktop: descargar directamente
                downloadPDF();
                showToast("Compartir no disponible, se descargó el PDF");
            }
        }

        function downloadPDF() {
            if (!lastPdfBlob) return;
            const url = URL.createObjectURL(lastPdfBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = lastPdfFilename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
